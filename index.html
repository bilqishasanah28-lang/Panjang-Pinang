<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panjat Pinang Matematika</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');

        body {
            font-family: 'Quicksand', sans-serif;
            /* Menggunakan gambar latar belakang yang diberikan */
            background: url('https://i.imgur.com/dEFHyot.jpeg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        /* Overlay untuk memastikan kontras tetap terjaga */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2); /* Overlay putih tipis agar cerah */
            z-index: -1;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            border-radius: 40px;
        }

        .btn-purple {
            background: linear-gradient(135deg, #a855f7 0%, #7e22ce 100%);
            box-shadow: 0 8px 0 #6b21a8;
            transition: all 0.1s;
        }

        .btn-purple:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #6b21a8;
        }

        .pole {
            width: 16px;
            background: #15803d;
            border-radius: 8px;
            position: relative;
            box-shadow: inset -4px 0 6px rgba(0,0,0,0.3), 2px 2px 10px rgba(0,0,0,0.2);
        }

        .climber {
            transition: bottom 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
            z-index: 10;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #f00;
            animation: fall 3s linear infinite;
            z-index: 100;
        }

        @keyframes fall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        .gift-container {
            position: absolute;
            top: -45px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
        }

        .gift-item {
            font-size: 28px;
            animation: dangle 2s ease-in-out infinite alternate;
            transform-origin: top center;
        }

        @keyframes dangle {
            from { transform: rotate(-15deg); }
            to { transform: rotate(15deg); }
        }

        .numpad-btn {
            background: white;
            border: 2px solid #e2e8f0;
            box-shadow: 0 4px 0 #cbd5e1;
            transition: all 0.1s;
            font-size: 1.25rem;
        }

        .numpad-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #cbd5e1;
        }

        /* Animasi Transisi Halaman */
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="app" class="w-full max-w-5xl h-[90vh] p-4 relative">
        <!-- 1️⃣ Halaman Pemilihan Operasi -->
        <div id="screen-start" class="h-full flex flex-col items-center justify-center space-y-8 animate-fade-in">
            <div class="glass-card p-10 text-center">
                <h1 class="text-5xl font-bold text-blue-900 mb-2 drop-shadow-sm">Panjat Pinang Matematika</h1>
                <p class="text-xl text-green-700 font-semibold">Pilih Jenis Operasi</p>
            </div>

            <div class="grid grid-cols-2 gap-6 w-full max-w-2xl px-4">
                <button onclick="selectOperation('add')" class="btn-purple p-8 rounded-[35px] text-white flex flex-col items-center group">
                    <i class="fas fa-plus text-5xl mb-3 transition-transform group-hover:scale-110"></i>
                    <span class="text-2xl font-bold">Penjumlahan</span>
                </button>
                <button onclick="selectOperation('sub')" class="btn-purple p-8 rounded-[35px] text-white flex flex-col items-center group">
                    <i class="fas fa-minus text-5xl mb-3 transition-transform group-hover:scale-110"></i>
                    <span class="text-2xl font-bold">Pengurangan</span>
                </button>
                <button onclick="selectOperation('mul')" class="btn-purple p-8 rounded-[35px] text-white flex flex-col items-center group">
                    <i class="fas fa-times text-5xl mb-3 transition-transform group-hover:scale-110"></i>
                    <span class="text-2xl font-bold">Perkalian</span>
                </button>
                <button onclick="selectOperation('div')" class="btn-purple p-8 rounded-[35px] text-white flex flex-col items-center group">
                    <i class="fas fa-divide text-5xl mb-3 transition-transform group-hover:scale-110"></i>
                    <span class="text-2xl font-bold">Pembagian</span>
                </button>
            </div>
        </div>

        <!-- 2️⃣ Halaman Pilih Level -->
        <div id="screen-level" class="hidden h-full flex flex-col items-center justify-center space-y-8 animate-fade-in">
            <div class="glass-card p-10 text-center">
                <h1 class="text-4xl font-bold text-blue-900 mb-1">Pilih Level Kesulitan</h1>
                <p id="mode-text" class="text-lg text-green-700 font-semibold">Mode: -</p>
            </div>

            <div class="flex flex-col space-y-6 w-full max-w-md">
                <button onclick="selectLevel(1)" class="bg-green-500 hover:bg-green-600 p-6 rounded-[35px] text-white flex items-center justify-between px-10 shadow-lg transition-transform hover:scale-105">
                    <div class="text-left">
                        <span class="block text-2xl font-bold">Beginner</span>
                        <span class="text-sm opacity-90">1 Digit + 1 Digit</span>
                    </div>
                    <div class="text-yellow-300 text-2xl"><i class="fas fa-star"></i></div>
                </button>

                <button onclick="selectLevel(2)" class="bg-orange-500 hover:bg-orange-600 p-6 rounded-[35px] text-white flex items-center justify-between px-10 shadow-lg transition-transform hover:scale-105">
                    <div class="text-left">
                        <span class="block text-2xl font-bold">Amateur</span>
                        <span class="text-sm opacity-90">Mixed 1-2 Digits</span>
                    </div>
                    <div class="text-yellow-300 text-2xl"><i class="fas fa-star"></i><i class="fas fa-star"></i></div>
                </button>

                <button onclick="selectLevel(3)" class="bg-red-500 hover:bg-red-600 p-6 rounded-[35px] text-white flex items-center justify-between px-10 shadow-lg transition-transform hover:scale-105">
                    <div class="text-left">
                        <span class="block text-2xl font-bold">Pro</span>
                        <span class="text-sm opacity-90">2 Digits + 2 Digits</span>
                    </div>
                    <div class="text-yellow-300 text-2xl"><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i></div>
                </button>

                <button onclick="showScreen('start')" class="mt-4 bg-white text-gray-600 px-8 py-3 rounded-full font-bold shadow-md self-center hover:bg-gray-50 transition-colors">
                    ← Kembali
                </button>
            </div>
        </div>

        <!-- 3️⃣ Halaman Gameplay -->
        <div id="screen-game" class="hidden h-full flex flex-col animate-fade-in">
            <div class="flex-1 flex gap-4 overflow-hidden py-4">
                <!-- Player 1 Side -->
                <div class="flex-1 flex flex-col items-center">
                    <div class="glass-card w-full p-4 flex flex-col items-center">
                        <div class="bg-red-600 text-white px-4 py-1 rounded-full font-bold text-sm mb-2 shadow-sm">PEMAIN 1</div>
                        <div id="p1-question" class="text-4xl font-bold mb-3 text-blue-900 bg-blue-50 w-full text-center py-2 rounded-2xl">6 + 1 = ?</div>
                        <div id="p1-input" class="bg-white border-4 border-blue-200 rounded-2xl w-36 h-14 flex items-center justify-center text-3xl font-bold text-blue-600 mb-4 shadow-inner"></div>
                        
                        <div class="grid grid-cols-3 gap-2 w-full max-w-[220px]">
                            <button onclick="typeNum(1, 1)" class="numpad-btn p-3 rounded-xl font-bold">1</button>
                            <button onclick="typeNum(1, 2)" class="numpad-btn p-3 rounded-xl font-bold">2</button>
                            <button onclick="typeNum(1, 3)" class="numpad-btn p-3 rounded-xl font-bold">3</button>
                            <button onclick="typeNum(1, 4)" class="numpad-btn p-3 rounded-xl font-bold">4</button>
                            <button onclick="typeNum(1, 5)" class="numpad-btn p-3 rounded-xl font-bold">5</button>
                            <button onclick="typeNum(1, 6)" class="numpad-btn p-3 rounded-xl font-bold">6</button>
                            <button onclick="typeNum(1, 7)" class="numpad-btn p-3 rounded-xl font-bold">7</button>
                            <button onclick="typeNum(1, 8)" class="numpad-btn p-3 rounded-xl font-bold">8</button>
                            <button onclick="typeNum(1, 9)" class="numpad-btn p-3 rounded-xl font-bold">9</button>
                            <button onclick="clearInput(1)" class="bg-red-500 text-white p-3 rounded-xl font-bold shadow-[0_4px_0_#b91c1c] active:translate-y-1 active:shadow-none transition-all">C</button>
                            <button onclick="typeNum(1, 0)" class="numpad-btn p-3 rounded-xl font-bold">0</button>
                            <button onclick="checkAnswer(1)" class="bg-blue-600 text-white p-3 rounded-xl font-bold shadow-[0_4px_0_#1e3a8a] active:translate-y-1 active:shadow-none transition-all">GO</button>
                        </div>
                        <div class="mt-4 font-bold text-blue-900 text-lg">Benar: <span id="p1-score" class="text-2xl text-green-600">0</span>/7</div>
                    </div>
                </div>

                <!-- Middle Pole Area -->
                <div class="w-48 flex flex-col items-center justify-end pb-12 relative">
                    <div class="flex gap-16 h-full items-end pb-4">
                        <!-- Pole 1 -->
                        <div class="pole h-[85%]">
                            <div class="absolute -top-12 -left-8 flex flex-col items-center">
                                <div class="bg-white border-2 border-red-600 text-red-600 p-1 rounded-sm text-[12px] font-bold shadow-sm">🇮🇩</div>
                                <div class="gift-container">
                                    <span class="gift-item">👕</span>
                                    <span class="gift-item">🎁</span>
                                </div>
                            </div>
                            <div id="climber-1" class="climber absolute -left-8 w-16 text-center" style="bottom: 0;">
                                <div class="bg-red-600 text-white text-[11px] rounded-full px-2 py-0.5 mb-1 shadow-md font-bold">P1</div>
                                <div class="text-4xl drop-shadow-md">👦</div>
                            </div>
                        </div>
                        
                        <!-- Pole 2 -->
                        <div class="pole h-[85%]">
                            <div class="absolute -top-12 -left-8 flex flex-col items-center">
                                <div class="bg-white border-2 border-red-600 text-red-600 p-1 rounded-sm text-[12px] font-bold shadow-sm">🇮🇩</div>
                                <div class="gift-container">
                                    <span class="gift-item">🎸</span>
                                    <span class="gift-item">📱</span>
                                </div>
                            </div>
                            <div id="climber-2" class="climber absolute -left-8 w-16 text-center" style="bottom: 0;">
                                <div class="bg-blue-600 text-white text-[11px] rounded-full px-2 py-0.5 mb-1 shadow-md font-bold">P2</div>
                                <div class="text-4xl drop-shadow-md">🧑</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Player 2 Side -->
                <div class="flex-1 flex flex-col items-center">
                    <div class="glass-card w-full p-4 flex flex-col items-center">
                        <div class="bg-blue-600 text-white px-4 py-1 rounded-full font-bold text-sm mb-2 shadow-sm">PEMAIN 2</div>
                        <div id="p2-question" class="text-4xl font-bold mb-3 text-blue-900 bg-blue-50 w-full text-center py-2 rounded-2xl">4 x 2 = ?</div>
                        <div id="p2-input" class="bg-white border-4 border-blue-200 rounded-2xl w-36 h-14 flex items-center justify-center text-3xl font-bold text-blue-600 mb-4 shadow-inner"></div>
                        
                        <div class="grid grid-cols-3 gap-2 w-full max-w-[220px]">
                            <button onclick="typeNum(2, 1)" class="numpad-btn p-3 rounded-xl font-bold">1</button>
                            <button onclick="typeNum(2, 2)" class="numpad-btn p-3 rounded-xl font-bold">2</button>
                            <button onclick="typeNum(2, 3)" class="numpad-btn p-3 rounded-xl font-bold">3</button>
                            <button onclick="typeNum(2, 4)" class="numpad-btn p-3 rounded-xl font-bold">4</button>
                            <button onclick="typeNum(2, 5)" class="numpad-btn p-3 rounded-xl font-bold">5</button>
                            <button onclick="typeNum(2, 6)" class="numpad-btn p-3 rounded-xl font-bold">6</button>
                            <button onclick="typeNum(2, 7)" class="numpad-btn p-3 rounded-xl font-bold">7</button>
                            <button onclick="typeNum(2, 8)" class="numpad-btn p-3 rounded-xl font-bold">8</button>
                            <button onclick="typeNum(2, 9)" class="numpad-btn p-3 rounded-xl font-bold">9</button>
                            <button onclick="clearInput(2)" class="bg-red-500 text-white p-3 rounded-xl font-bold shadow-[0_4px_0_#b91c1c] active:translate-y-1 active:shadow-none transition-all">C</button>
                            <button onclick="typeNum(2, 0)" class="numpad-btn p-3 rounded-xl font-bold">0</button>
                            <button onclick="checkAnswer(2)" class="bg-blue-600 text-white p-3 rounded-xl font-bold shadow-[0_4px_0_#1e3a8a] active:translate-y-1 active:shadow-none transition-all">GO</button>
                        </div>
                        <div class="mt-4 font-bold text-blue-900 text-lg">Benar: <span id="p2-score" class="text-2xl text-green-600">0</span>/7</div>
                    </div>
                </div>
            </div>
            <div class="text-center text-blue-900 font-bold p-3 bg-white/80 rounded-full mb-4 mx-auto px-10 shadow-md">
                Jawab soal untuk memanjat tiang! (7 jawaban benar untuk menang)
            </div>
        </div>

        <!-- 4️⃣ Halaman Akhir -->
        <div id="screen-win" class="hidden h-full flex flex-col items-center justify-center space-y-6">
            <div class="glass-card p-12 text-center transform scale-110 shadow-2xl">
                <div class="text-7xl mb-6">🏆</div>
                <h2 id="winner-text" class="text-4xl font-bold text-blue-900 mb-2">PEMAIN 1 MENANG!</h2>
                <p class="text-xl text-green-700 mb-8 font-semibold italic">Hebat! Kamu berhasil mencapai puncak pinang!</p>
                <div class="flex gap-4 justify-center">
                    <button onclick="restartGame()" class="btn-purple px-10 py-4 rounded-full text-white font-bold text-xl">Main Lagi</button>
                    <button onclick="showScreen('start')" class="bg-white px-10 py-4 rounded-full text-gray-700 font-bold text-xl shadow-lg border-2 border-gray-100 hover:bg-gray-50 transition-colors">Menu Utama</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentOp = '';
        let currentLevel = 1;
        let gameState = {
            p1: { score: 0, answer: 0, input: '', question: '' },
            p2: { score: 0, answer: 0, input: '', question: '' }
        };

        const screens = ['start', 'level', 'game', 'win'];

        function showScreen(screenId) {
            screens.forEach(s => {
                document.getElementById('screen-' + s).classList.add('hidden');
            });
            document.getElementById('screen-' + screenId).classList.remove('hidden');
        }

        function selectOperation(op) {
            currentOp = op;
            const opNames = { add: 'Penjumlahan', sub: 'Pengurangan', mul: 'Perkalian', div: 'Pembagian' };
            document.getElementById('mode-text').innerText = 'Mode: ' + opNames[op];
            showScreen('level');
        }

        function selectLevel(lv) {
            currentLevel = lv;
            startGame();
        }

        function startGame() {
            gameState.p1 = { score: 0, answer: 0, input: '', question: '' };
            gameState.p2 = { score: 0, answer: 0, input: '', question: '' };
            updateScoreUI();
            generateQuestion(1);
            generateQuestion(2);
            updateClimbers();
            showScreen('game');
        }

        function generateQuestion(p) {
            let n1, n2, ans;
            // Level logic
            let range = currentLevel === 1 ? 9 : (currentLevel === 2 ? 30 : 99);
            
            if (currentOp === 'add') {
                n1 = Math.floor(Math.random() * range) + 1;
                n2 = Math.floor(Math.random() * (currentLevel === 1 ? 9 : range)) + 1;
                ans = n1 + n2;
                gameState['p'+p].question = `${n1} + ${n2} = ?`;
            } else if (currentOp === 'sub') {
                n1 = Math.floor(Math.random() * range) + (currentLevel === 1 ? 5 : 10);
                n2 = Math.floor(Math.random() * n1);
                ans = n1 - n2;
                gameState['p'+p].question = `${n1} - ${n2} = ?`;
            } else if (currentOp === 'mul') {
                let mRange = currentLevel === 1 ? 5 : (currentLevel === 2 ? 9 : 12);
                n1 = Math.floor(Math.random() * mRange) + 1;
                n2 = Math.floor(Math.random() * 10) + 1;
                ans = n1 * n2;
                gameState['p'+p].question = `${n1} × ${n2} = ?`;
            } else if (currentOp === 'div') {
                let dRange = currentLevel === 1 ? 5 : (currentLevel === 2 ? 10 : 12);
                n2 = Math.floor(Math.random() * dRange) + 1;
                ans = Math.floor(Math.random() * (currentLevel === 1 ? 5 : 10)) + 1;
                n1 = n2 * ans;
                gameState['p'+p].question = `${n1} ÷ ${n2} = ?`;
            }

            gameState['p'+p].answer = ans;
            gameState['p'+p].input = '';
            document.getElementById(`p${p}-question`).innerText = gameState['p'+p].question;
            document.getElementById(`p${p}-input`).innerText = '';
        }

        function typeNum(p, num) {
            if (gameState['p'+p].input.length < 4) {
                gameState['p'+p].input += num;
                document.getElementById(`p${p}-input`).innerText = gameState['p'+p].input;
            }
        }

        function clearInput(p) {
            gameState['p'+p].input = '';
            document.getElementById(`p${p}-input`).innerText = '';
        }

        function checkAnswer(p) {
            if (gameState['p'+p].input === '') return;
            
            const userAns = parseInt(gameState['p'+p].input);
            if (userAns === gameState['p'+p].answer) {
                gameState['p'+p].score++;
                updateScoreUI();
                updateClimbers();
                
                if (gameState['p'+p].score >= 7) {
                    endGame(p);
                } else {
                    generateQuestion(p);
                }
            } else {
                const el = document.getElementById(`p${p}-input`);
                el.classList.add('animate-bounce', 'text-red-500', 'border-red-500');
                setTimeout(() => {
                    el.classList.remove('animate-bounce', 'text-red-500', 'border-red-500');
                    clearInput(p);
                }, 500);
            }
        }

        function updateScoreUI() {
            document.getElementById('p1-score').innerText = gameState.p1.score;
            document.getElementById('p2-score').innerText = gameState.p2.score;
        }

        function updateClimbers() {
            const h1 = (gameState.p1.score / 7) * 95;
            const h2 = (gameState.p2.score / 7) * 95;
            document.getElementById('climber-1').style.bottom = h1 + '%';
            document.getElementById('climber-2').style.bottom = h2 + '%';
        }

        function endGame(winner) {
            document.getElementById('winner-text').innerText = `PEMAIN ${winner} MENANG!`;
            showScreen('win');
            createConfetti();
        }

        function restartGame() {
            startGame();
        }

        function createConfetti() {
            const colors = ['#f00', '#0f0', '#00f', '#ff0', '#f0f', '#0ff'];
            for (let i = 0; i < 60; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + 'vw';
                c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                c.style.animationDelay = Math.random() * 2 + 's';
                c.style.width = (Math.random() * 10 + 5) + 'px';
                c.style.height = c.style.width;
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 4000);
            }
        }
    </script>
</body>
</html>
